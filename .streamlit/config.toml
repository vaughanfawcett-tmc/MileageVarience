[theme]
base = "light"
primaryColor = "#2563EB"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F8FA"
textColor = "#111827"
font = "sans serif"

[client]
toolbarMode = "minimal"

[browser]
# Don't phone home to Streamlit's telemetry on each session — trims load latency.
gatherUsageStats = false

[server]
# No file-watching in production (Render had no watchdog); avoids wasted startup work.
fileWatcherType = "none"

[ui]
hideTopBar = true
