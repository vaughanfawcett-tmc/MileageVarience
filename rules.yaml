# Trip Reason Classification Rules
# Maintained by TMC Employee Services. Edit keywords/phrases here without touching code.
# Matching is case-insensitive, whole-word where possible. Phrases match as substrings.
#
# Precedence (highest wins):
#   1. empty_or_generic         -> Not Acceptable
#   2. not_acceptable           -> Not Acceptable
#   3. acceptable               -> Acceptable
#   4. potentially_acceptable   -> Potentially Acceptable
#   5. default (no match)       -> Potentially Acceptable (flag for review)

# Variance threshold (%) above which a reason is required.
# Trips at or below this variance are auto-classified as Acceptable regardless of reason text.
variance_tolerance_pct: 10

empty_or_generic:
  - ""
  - "-"
  - "."
  - "n/a"
  - "na"
  - "none"
  - "no reason"
  - "no comment"
  - "idk"
  - "dunno"
  - "don't know"
  - "dont know"
  - "not sure"
  - "?"

